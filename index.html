<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Methods — Groups</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --ink:#1b1d2a;
    --paper:#f6f4ef;
    --card:#ffffff;
    --line:#e4e0d6;
    --navy:#232653;
    --gold:#c8912f;
    --muted:#6b6f80;

    /* region palette — one distinct hue per Ghana region code in the data */
    --r-VR:#2f6f6a;  /* Volta        - teal    */
    --r-CR:#c8912f;  /* Central      - gold    */
    --r-AS:#8a3b3b;  /* Ashanti      - brick   */
    --r-ER:#3d5a80;  /* Eastern      - steel   */
    --r-NR:#6d5a8c;  /* Northern     - plum    */
    --r-BA:#4a7c3f;  /* Brong-Ahafo  - moss    */
    --r-WR:#b5651d;  /* Western      - ochre   */
    --r-UE:#2a5c8a;  /* Upper East   - blue    */
    --r-UW:#7a6a3f;  /* Upper West   - olive   */
    --r-GA:#a3455a;  /* Greater Accra- rose    */
  }

  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header{
    background:var(--navy); color:#f2f1ea;
    padding:3.2rem 1.5rem 2.6rem; text-align:center;
    border-bottom:6px solid var(--gold);
  }
  header .eyebrow{
    font-size:.72rem; letter-spacing:.16em; text-transform:uppercase;
    color:#c9c6e8; margin-bottom:.6rem; font-weight:600;
  }
  header h1{
    font-family:'Fraunces',serif; font-weight:600; font-size:clamp(1.8rem,4vw,2.7rem);
    margin:0 0 .5rem;
  }
  header p{ margin:0; color:#c3c1da; font-size:.98rem; }

  .search-wrap{
    max-width:640px; margin:-1.6rem auto 0; padding:0 1.2rem; position:relative; z-index:5;
  }
  #searchInput{
    width:100%; padding:1rem 1.4rem; border-radius:14px; border:1px solid var(--line);
    box-shadow:0 12px 24px -10px rgba(35,38,83,.25); outline:none; font-size:1rem;
    font-family:inherit; background:var(--card); color:var(--ink);
  }
  #searchInput:focus{ border-color:var(--navy); }

  #searchResults{ max-width:640px; margin:.7rem auto 0; padding:0 1.2rem; }
  .result-card{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:.85rem 1.1rem; margin-bottom:.55rem; display:flex; justify-content:space-between;
    align-items:center; gap:1rem;
  }
  .result-card strong{ font-weight:600; }
  .result-card .idx{ color:var(--muted); font-size:.85rem; }
  .result-tag{
    color:#fff; padding:.25rem .7rem; border-radius:999px; font-size:.72rem;
    font-weight:600; letter-spacing:.03em; white-space:nowrap;
  }

  /* region legend / filter */
  .legend{
    max-width:900px; margin:2.2rem auto .4rem; padding:0 1.2rem;
    display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center;
  }
  .legend button{
    display:flex; align-items:center; gap:.45rem; font-family:inherit;
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:.4rem .85rem .4rem .6rem; cursor:pointer; font-size:.78rem; font-weight:600;
    color:var(--ink); transition:.15s ease;
  }
  .legend button .dot{ width:.62rem; height:.62rem; border-radius:50%; flex:none; }
  .legend button:hover{ border-color:var(--navy); }
  .legend button.active{ background:var(--navy); border-color:var(--navy); color:#fff; }
  .legend .clear{ opacity:.65; font-weight:500; }

  .section-label{
    text-align:center; max-width:900px; margin:1.6rem auto .2rem; padding:0 1.2rem;
    color:var(--muted); font-size:.82rem;
  }

  .container{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:16px; padding:1.2rem; max-width:960px; margin:0 auto 3rem;
  }

  .group-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:1.1rem 1.1rem 1rem; cursor:pointer; text-align:left;
    box-shadow:0 2px 6px rgba(27,29,42,.04); transition:.18s ease;
  }
  .group-card:hover{ transform:translateY(-3px); box-shadow:0 10px 20px -8px rgba(27,29,42,.18); border-color:var(--navy); }
  .group-card.dimmed{ opacity:.32; }
  .group-card.highlighted{ border-color:var(--gold); box-shadow:0 0 0 2px var(--gold); }

  .group-card .g-num{
    font-family:'Fraunces',serif; font-size:1.5rem; font-weight:600; line-height:1;
  }
  .group-card .g-count{ color:var(--muted); font-size:.78rem; margin-top:.2rem; }
  .g-regions{ display:flex; gap:4px; margin-top:.7rem; flex-wrap:wrap; }
  .g-regions .dot{ width:.5rem; height:.5rem; border-radius:50%; }

  /* modal */
  .modal{
    display:none; position:fixed; inset:0; background:rgba(27,29,42,.55);
    backdrop-filter:blur(3px); z-index:1000; padding:2rem 1rem;
  }
  .modal-content{
    background:var(--card); margin:2vh auto; padding:2rem; width:100%; max-width:720px;
    border-radius:18px; position:relative; max-height:88vh; overflow-y:auto;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.4);
  }
  .modal-content h2{ font-family:'Fraunces',serif; font-weight:600; margin:0 0 1rem; }
  .close{
    position:absolute; top:1.1rem; right:1.3rem; font-size:1.6rem; cursor:pointer;
    color:var(--muted); line-height:1;
  }
  .close:hover{ color:var(--ink); }

  table{ width:100%; border-collapse:collapse; }
  th{
    background:var(--paper); padding:.7rem .8rem; text-align:left; font-size:.78rem;
    text-transform:uppercase; letter-spacing:.04em; color:var(--muted); border-bottom:1px solid var(--line);
  }
  td{ padding:.7rem .8rem; border-bottom:1px solid var(--line); font-size:.92rem; }
  td.rtag{ white-space:nowrap; }
  .badge{ color:#fff; padding:.2rem .55rem; border-radius:999px; font-size:.72rem; font-weight:600; }

  footer{ text-align:center; color:var(--muted); font-size:.8rem; padding:1rem 1rem 2.5rem; }
</style>
</head>

const regionNames = {
  VR:"Volta", CR:"Central", AS:"Ashanti", ER:"Eastern", NR:"Northern",
  BA:"Brong-Ahafo", WR:"Western", UE:"Upper East", UW:"Upper West", GA:"Greater Accra"
};

const groupContainer = document.getElementById("groupContainer");
const modal = document.getElementById("groupModal");
const studentList = document.getElementById("studentList");
const legend = document.getElementById("legend");
const sectionLabel = document.getElementById("sectionLabel");

let activeRegion = null;

// Build region legend/filter
const regionsPresent = Object.keys(regionNames).filter(r =>
  Object.values(groups).some(list => list.some(s => s.region === r))
);

regionsPresent.forEach(r => {
  const btn = document.createElement("button");
  btn.innerHTML = `<span class="dot" style="background:var(--r-${r})"></span>${r} · ${regionNames[r]}`;
  btn.onclick = () => {
    activeRegion = activeRegion === r ? null : r;
    renderLegend();
    renderCards();
  };
  btn.dataset.region = r;
  legend.appendChild(btn);
});

function renderLegend(){
  [...legend.children].forEach(btn => {
    btn.classList.toggle("active", btn.dataset.region === activeRegion);
  });
  sectionLabel.textContent = activeRegion
    ? `Showing groups with students from ${regionNames[activeRegion]} (${activeRegion}) — click again to clear`
    : "22 groups · click a region above to filter, or click any group to view its members";
}

function renderCards(){
  groupContainer.innerHTML = "";
  Object.keys(groups).forEach(num => {
    const list = groups[num];
    const hasRegion = list.some(s => s.region === activeRegion);
    const card = document.createElement("div");
    card.className = "group-card";
    if (activeRegion) card.classList.add(hasRegion ? "highlighted" : "dimmed");

    const uniqueRegions = [...new Set(list.map(s => s.region))];
    const dots = uniqueRegions.map(r => `<span class="dot" style="background:var(--r-${r})" title="${regionNames[r] || r}"></span>`).join("");

    card.innerHTML = `
      <div class="g-num">Group ${num}</div>
      <div class="g-count">${list.length} member${list.length !== 1 ? "s" : ""}</div>
      <div class="g-regions">${dots}</div>
    `;
    card.onclick = () => showGroup(num);
    groupContainer.appendChild(card);
  });
}

function showGroup(num){
  document.getElementById("modalTitle").innerText = `Group ${num}`;
  studentList.innerHTML = groups[num].map((s, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${s.name}</td>
      <td>${s.index}</td>
      <td class="rtag"><span class="badge" style="background:var(--r-${s.region})">${s.region}</span></td>
    </tr>
  `).join('');
  modal.style.display = "block";
}

document.querySelector(".close").onclick = () => modal.style.display = "none";
window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };

document.getElementById("searchInput").addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase().trim();
  const results = document.getElementById("searchResults");
  results.innerHTML = val.length < 2 ? "" : Object.entries(groups).flatMap(([g, list]) =>
    list.filter(s => s.name.toLowerCase().includes(val) || s.index.toLowerCase().includes(val))
        .map(s => `
          <div class="result-card">
            <div><strong>${s.name}</strong><br><span class="idx">${s.index}</span></div>
            <span class="result-tag" style="background:var(--r-${s.region})">Group ${g}</span>
          </div>`)
  ).join('');
});

renderLegend();
renderCards();
</script>
